<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>

  <!-- ===========================
       CSS & JS LINKS
       =========================== -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>

<body>
  <!-- ===========================
       LENGUAJE / LANGUAGE (PLEASE DO NOT REMOVE)
       =========================== -->
  <div class="LanguageSelector">
    <button class="LangBtn" id="lang-en">English</button>
    <button class="LangBtn" id="lang-es">Español</button>
  </div>
  
  <!-- Tooltip area (JS needed it, i still hate it) -->
  <div id="tooltip">Hover over a special button to see instructions...</div>

  <!-- ===========================
       FLEX LAYOUT (Don´t ask why, but without this the
        spec buttons and range values translations break)
       =========================== -->
  <section id="calc-layout">
    <div id="rangeTab">
        <h2></h2>
      <!-- Range table should appear -->
      <div id="rangeTable">
    </div>

    <div id="graphTab">
        <h2></h2>
      <!-- Graph will appear here, i think -->
      <img id="plot-image" src="" alt="Function plot" style="display:none;">
    </div>
  </section>

  <!-- ===========================
       MAIN LAYOUT: CALCULATOR + SIDE PANEL
       =========================== -->
  <section id="main-layout">
    <!-- Calculator rectangle or box or whatever-->
    <div class="wrapper">
      <!-- ===========================
           DISPLAY SECTION
           =========================== -->
      <section id="screen" class="Layout">0</section>

      <!-- ===========================
           CALCULATOR BUTTONS
           =========================== -->
      <section class="Buttons-Cctr">
        <!-- Row 1 -->
        <button class="ButtonDouble-Cctr" id="clearBtn">C</button>
        <button class="Button-Cctr" id="backspaceBtn">&larr;</button>
        <button class="Button-Cctr" data-value="/">÷</button>

        <!-- Row 2 -->
        <button class="Button-Cctr" data-value="sin">sin</button>
        <button class="Button-Cctr" data-value="cos">cos</button>
        <button class="Button-Cctr" data-value="tan">tan</button>
        <button class="Button-Cctr" data-value="pi">π</button>

        <!-- Row 3 -->
        <button class="Button-Cctr" data-value="7">7</button>
        <button class="Button-Cctr" data-value="8">8</button>
        <button class="Button-Cctr" data-value="9">9</button>
        <button class="Button-Cctr" data-value="*">×</button>

        <!-- Row 4 -->
        <button class="Button-Cctr" data-value="4">4</button>
        <button class="Button-Cctr" data-value="5">5</button>
        <button class="Button-Cctr" data-value="6">6</button>
        <button class="Button-Cctr" data-value="-">−</button>

        <!-- Row 5 -->
        <button class="Button-Cctr" data-value="1">1</button>
        <button class="Button-Cctr" data-value="2">2</button>
        <button class="Button-Cctr" data-value="3">3</button>
        <button class="Button-Cctr" data-value="+">+</button>

        <!-- Row 6 -->
        <button class="ButtonTriple-Cctr" data-value="0">0</button>
        <button class="Button-Cctr" data-value=".">.</button>

        <!-- Row 7 -->
        <button class="Button-Cctr" data-value="(">(</button>
        <button class="Button-Cctr" data-value=")">)</button>
        <button class="Button-Cctr" data-value="**">^</button>
        <button class="Button-Cctr" data-value="x">x</button>
        <button class="Button-Cctr" data-value="y">y</button>
        <button class="Button-Cctr" data-value="z">z</button>
        <button class="Button-Cctr" id="equalsBtn">=</button>
      </section>
    </div>

    <!-- Side panel -->
    <div class="side-panel">
      <!-- ===========================
           VARIABLE INPUT
           =========================== -->
      <section class="VariableInput">
        <label for="xValue">x</label>
        <input type="number" id="xValue" value="0" step="0.1">
        <label for="yValue">y</label>
        <input type="number" id="yValue" value="0" step="0.1">
        <label for="zValue">z</label>
        <input type="number" id="zValue" value="0" step="0.1">
      </section>

      <!-- ===========================
           START END STEP INPUT
           =========================== -->
      <section class="RangeInput">
        <label for="startValue">Start </label>
        <input type="number" id="startValue" value="0" step="0.1">
        <label for="endValue">End </label>
        <input type="number" id="endValue" value="10" step="0.1">
        <label for="stepValue">Step </label>
        <input type="number" id="stepValue" value="1" step="0.1">
      </section>

      <!-- ===========================
           EXTRA CONTROLS: SOLVER FEATURES
           =========================== -->
      <section class="ExtraControls">
        <button class="Button-Cctr" id="rangeBtn">Range</button>
        <button class="Button-Cctr" id="derivativeBtn">Derivative</button>
        <button class="Button-Cctr" id="integralBtn">Integral</button>
        <button class="Button-Cctr" id="rootBtn">Root</button>
        <button class="Button-Cctr" id="plotBtn">Graph</button>
      </section>


      <!-- ===========================
           SOLVER MESSAGE OUTPUT
           =========================== -->
      <section id="solverMessage"><!-- Message JS (I hate u) --></section>
    </div>
  </section>
</body>
</html>

<!-- ===========================
     FAVICON
     =========================== -->
<link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
